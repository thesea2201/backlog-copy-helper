<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    body {
      width: 280px;
      padding: 16px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      font-size: 14px;
    }
    h3 {
      margin: 0 0 12px 0;
      font-size: 16px;
      color: #333;
    }
    .form-group {
      margin-bottom: 12px;
    }
    label {
      display: block;
      margin-bottom: 4px;
      color: #666;
      font-size: 12px;
    }
    select {
      width: 100%;
      padding: 8px;
      border: 1px solid #ddd;
      border-radius: 4px;
      font-size: 14px;
      background: white;
    }
    .info {
      margin-top: 12px;
      padding: 8px;
      background: #f5f5f5;
      border-radius: 4px;
      font-size: 11px;
      color: #666;
    }
    .status {
      margin-top: 8px;
      font-size: 12px;
      color: #10b981;
    }
    .cache-section {
      margin-top: 16px;
      padding-top: 12px;
      border-top: 1px solid #e5e5e5;
    }
    .cache-section h4 {
      margin: 0 0 8px 0;
      font-size: 13px;
      color: #444;
    }
    .clear-btn {
      width: 100%;
      padding: 8px 12px;
      margin-top: 8px;
      background: #fee2e2;
      color: #dc2626;
      border: 1px solid #fecaca;
      border-radius: 4px;
      font-size: 12px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .clear-btn:hover {
      background: #fecaca;
    }
    .cache-stats {
      font-size: 11px;
      color: #888;
      margin-top: 6px;
    }
    textarea {
      width: 100%;
      padding: 8px;
      border: 1px solid #ddd;
      border-radius: 4px;
      font-size: 13px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      resize: vertical;
      box-sizing: border-box;
    }
    textarea:focus {
      outline: none;
      border-color: #3b82f6;
    }
  </style>
</head>
<body>
  <h3>Backlog Utils - Translation</h3>
  
  <div class="form-group">
    <label for="targetLang">Target Language</label>
    <select id="targetLang">
      <option value="en">English</option>
      <option value="ja">Japanese</option>
      <option value="vi">Vietnamese</option>
      <option value="es">Spanish</option>
      <option value="fr">French</option>
      <option value="de">German</option>
      <option value="zh">Chinese (Simplified)</option>
      <option value="ko">Korean</option>
      <option value="ru">Russian</option>
      <option value="pt">Portuguese</option>
    </select>
  </div>

  <div class="cache-section">
    <h4>Cache Settings</h4>
    <div class="form-group">
      <label for="cacheDuration">Keep Translations For</label>
      <select id="cacheDuration">
        <option value="-1">Never (no cache)</option>
        <option value="7">7 days</option>
        <option value="30">1 month</option>
        <option value="0">Forever</option>
      </select>
    </div>
    <div class="cache-stats" id="cacheStats"></div>
    <div id="cachedList"></div>
    <button class="clear-btn" id="clearCacheBtn">Clear All Cache</button>
    <button class="clear-btn" id="resetGeminiChatBtn" style="margin-top: 8px; background: #fef3c7; color: #d97706; border-color: #fde68a;">Reset Gemini Chat</button>
  </div>

  <div class="cache-section">
    <h4>Custom Translation Prompt</h4>
    <div class="form-group">
      <label for="customPrompt">Prompt Instruction</label>
      <textarea id="customPrompt" rows="4" placeholder="Enter your custom translation instructions..."></textarea>
      <small style="color: #666; display: block; margin-top: 4px;">Use {lang} as placeholder for target language. Leave empty to use default.</small>
    </div>
    <button class="clear-btn" id="savePromptBtn" style="background: #dbeafe; color: #1d4ed8; border-color: #93c5fd;">Save Prompt</button>
  </div>
  
  <div class="info">
    <strong>Rate Limit:</strong> Max 5 translations per minute.<br>
    <strong>Engine:</strong> Google Translate API (with Gemini experimental fallback)
  </div>
  
  <div class="status" id="status"></div>
  
  <script src="popup.js"></script>
</body>
</html>
